// SHA-256 hashing via Web Crypto API (inbyggt i alla moderna webbläsare)
async function sha256(str){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
// Hasha PIN med user-id som salt (unikt per användare) – jämförs sedan server-side via RPC
async function hashPin(pin,userId){ return sha256(pin+"|"+userId); }

async function subscribeToPush(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)) return null;
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Spara prenumeration i Supabase
    const subJson=sub.toJSON();
    await sb.from("push_subscriptions").upsert({
      id:currentUser.id+"-"+btoa(subJson.endpoint).slice(0,20),
      user_id:currentUser.id,
      endpoint:subJson.endpoint,
      keys:subJson.keys
    });
    return sub;
  }catch(e){console.error("Push subscribe failed:",e);return null;}
}

async function unsubscribeFromPush(){
  if(!('serviceWorker' in navigator)) return;
  const reg=await navigator.serviceWorker.ready;
  const sub=await reg.pushManager.getSubscription();
  if(sub){
    await sub.unsubscribe();
    await sb.from("push_subscriptions").delete().eq("user_id",currentUser.id);
  }
}

async function getPushSubscriptionStatus(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window)) return false;
  const reg=await navigator.serviceWorker.ready;
  const sub=await reg.pushManager.getSubscription();
  return !!sub;
}

function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=window.atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

window.saveTips = async function(){
  const statusEl = document.getElementById("tipp-status");
  if(statusEl) statusEl.textContent = "Sparar…";
  try {
    const rd = rounds[String(userSelectedRound||cfg.omg)];
    if(!rd || !rd.matches.length){ if(statusEl) statusEl.textContent="Inga matcher att tippa på."; return; }
    const tipsArr = rd.matches.map(m => {
      const hEl = document.querySelector('[data-hid="'+m.hId+'"][data-aid="'+m.aId+'"][data-side="h"]');
      const aEl = document.querySelector('[data-hid="'+m.hId+'"][data-aid="'+m.aId+'"][data-side="a"]');
      return { hId:m.hId, aId:m.aId, predH: hEl?Number(hEl.value)||0:0, predA: aEl?Number(aEl.value)||0:0 };
    });
    const allTips = Object.assign({}, currentUser.tips || {});
    allTips[String(userSelectedRound||cfg.omg)] = tipsArr;
    const { error } = await sb.from("fantasy_users").update({ tips: allTips }).eq("id", currentUser.id);
    if(error){
      if(statusEl) statusEl.innerHTML = '<span style="color:#A32D2D">Fel: '+error.message+'</span>';
      return;
    }
    currentUser = Object.assign({}, currentUser, { tips: allTips });
    users = users.map(u => u.id === currentUser.id ? Object.assign({}, u, { tips: allTips }) : u);
    if(statusEl) statusEl.innerHTML = '<span style="color:#1a6b3c;font-weight:500">✓ Tips sparade!</span>';
  } catch(e){
    if(statusEl) statusEl.innerHTML = '<span style="color:#A32D2D">JS-fel: '+e.message+'</span>';
  }
};

async function distributeQuizQuestions(totalRounds=26){
  // Hämta alla frågor i banken (round_num = null)
  const bank=await fetchQuizBank();
  if(!bank.length)return{error:{message:"Inga frågor i banken."},distributed:0};
  // Blanda slumpmässigt
  const shuffled=[...bank].sort(()=>Math.random()-0.5);
  let distributed=0;
  for(let round=1;round<=totalRounds;round++){
    const slice=shuffled.slice((round-1)*5,round*5);
    if(!slice.length)break;
    for(const q of slice){
      await sb.from("quiz_questions").update({round_num:round}).eq("id",q.id);
      distributed++;

  return{error:null,distributed};

function plPts(player,rd){
  if(!rd)return 0;
  const m=rd.matches.find(x=>x.hId===player.teamId||x.aId===player.teamId);

  const home=m.hId===player.teamId;
  const mg=home?m.hMål:m.aMål, og=home?m.aMål:m.hMål;
  let p=mg>og?5:(mg===og?2:0);
  if(og===0)p+=POS_PTS[player.pos].clean;
  const goals=(rd.goals&&rd.goals[player.id])||0;
  p+=goals*POS_PTS[player.pos].goal;
  return p;
}

function tipMatchPts(pred,actualH,actualA){
  if(!pred)return 0;
  const ph=Number(pred.predH), pa=Number(pred.predA);
  if(ph===actualH && pa===actualA) return 10;
  let pts=0;
  if(ph===actualH) pts+=4;
  if(pa===actualA) pts+=4;
  if(pts===0){
    const actualSign = actualH>actualA?1:(actualH<actualA?-1:0);
    const predSign = ph>pa?1:(ph<pa?-1:0);
    if(actualSign===predSign) pts=2;
  }
  return pts;
}
function userTipRoundPts(u,r){
  const rd=rounds[String(r)];
  if(!rd||!rd.results_published||!rd.matches.length)return 0;
  if(rd.locked_at && u.created_at && new Date(rd.locked_at) < new Date(u.created_at)) return 0;
  const tipsForRound = (u.tips&&u.tips[String(r)])||[];
  let tot=0;
  rd.matches.forEach(m=>{
    const pred=tipsForRound.find(t=>t.hId===m.hId&&t.aId===m.aId);
    tot+=tipMatchPts(pred,m.hMål,m.aMål);
  });
  return tot;
}

}
function formatCountdown(deadlineIso){

  const d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000), m=Math.floor(diff%3600000/60000);
  if(d>0)return `⏰ Spelstopp om ${d}d ${h}h ${m}m`;
  if(h>0)return `⏰ Spelstopp om ${h}h ${m}m`;
  return `⏰ Spelstopp om ${m} min`;
}

  else if(screen==="home")root.innerHTML=renderHome();
  else if(screen==="reg")root.innerHTML=renderReg();
  else if(screen==="mode")root.innerHTML=renderModeSelect();
  else if(screen==="pick"){root.innerHTML=renderPick();
    // Sök-hook: re-renderar bara spellistan utan att hoppa till toppen
    window._playerSearchRender=()=>{
      const list=document.getElementById("player-list");
      if(list){
        const searchVal=document.getElementById("player-search")?.value.toLowerCase()||"";
        const teamFilter=document.getElementById("team-filter")?.value||"";
        const usedTeams=usedTeamIds(null);
        const filtered=players.filter(p=>{
          if(p.pos!==pickPos)return false;
          if(searchVal&&!p.namn.toLowerCase().includes(searchVal))return false;
          if(teamFilter&&String(p.teamId)!==teamFilter)return false;
          return true;
        });
        const picks=currentUser.picks||{GK:[],DEF:[],MID:[],FW:[]};
        const kap=currentUser.kapten;
        list.innerHTML=filtered.map(p=>{
          const sel=(picks[p.pos]||[]).includes(p.id);
          const isCap=kap===p.id;
          const team=TEAMS.find(t=>t.id===p.teamId);
          const c=POS_COLOR[p.pos];
          const teamTaken=!sel&&usedTeams.includes(p.teamId);
          const posFull=!sel&&(picks[p.pos]||[]).length>=POS_COUNT[p.pos];
          const disabled=teamTaken||posFull;
          return `<div class="fg-card" style="margin-bottom:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;opacity:${disabled?0.45:1}">

            <div style="flex:1">
              <div style="font-size:14px;font-weight:${sel?500:400}">${esc(p.namn)}</div>
              <div style="font-size:12px;color:var(--color-text-secondary)">${esc(team?team.name:"")}${teamTaken?' · lag redan valt':''}</div>
            </div>
            ${sel?`<button data-act="toggle-cap" data-id="${p.id}" style="background:${isCap?G_GOLDL:"var(--color-background-secondary)"};border:0.5px solid ${isCap?G_GOLD:"#ccc"};color:${isCap?G_GOLD:"var(--color-text-secondary)"};border-radius:20px;padding:3px 10px;cursor:pointer;font-size:12px;font-weight:500">${isCap?"★ Kapten":"☆"}</button>`:""}
            <button data-act="pick-player" data-id="${p.id}" ${disabled?"disabled":""} style="width:32px;height:32px;border-radius:50%;background:${sel?G_GREENL:"var(--color-background-secondary)"};border:0.5px solid ${sel?G_GREEN:"#ccc"};color:${sel?G_GREEN:"var(--color-text-secondary)"};display:flex;align-items:center;justify-content:center;cursor:${disabled?"not-allowed":"pointer"};font-size:16px;flex-shrink:0">${sel?"✓":"+"}</button>
          </div>`;
        }).join("")||'<div style="text-align:center;color:var(--color-text-secondary);padding:20px;font-size:13px">Inga spelare hittades</div>';
        attachHandlers();
      }
    };
  }
  else if(screen==="rules")root.innerHTML=renderRulesScreen();
  else root.innerHTML=renderMain();
  attachHandlers();
  // Uppdatera push-knapp asynkront när mode-skärmen visas
  if(screen==="mode"){
    getPushSubscriptionStatus().then(isSubbed=>{
      const btn=document.getElementById("push-btn");
      if(btn) btn.textContent=isSubbed?"🔕 Stäng av notiser":"🔔 Aktivera notiser";
    }).catch(()=>{});
  }
}

function pickMissingText(){
  const missing = POSITIONS.filter(pos=>(pickState.picks[pos]||[]).length < POS_COUNT[pos]);
  if(missing.length) return "Saknas: "+missing.map(p=>{
    const have=(pickState.picks[p]||[]).length;
    return `${POS_LABEL[p]} (${have}/${POS_COUNT[p]})`;
  }).join(", ");
  if(!pickState.kapten) return "Saknas: välj en kapten (klicka ☆ på en av dina spelare)";
  return "";
}

function usedTeamIds(excludePid){
  let ids=[];
  POSITIONS.forEach(pos=>{ (pickState.picks[pos]||[]).forEach(pid=>{ if(pid!==excludePid)ids.push(pid); }); });
  return ids.map(pid=>{const p=players.find(x=>x.id===pid);return p?p.teamId:null;}).filter(x=>x!=null);
}

function renderPick(){
  const picks=pickState.picks, kap=pickState.kapten;
  const totalPicked = POSITIONS.reduce((s,pos)=>s+(picks[pos]||[]).length,0);
  const searchVal=document.getElementById("player-search")?document.getElementById("player-search").value.toLowerCase():"";
  const teamFilter=document.getElementById("team-filter")?document.getElementById("team-filter").value:"";
  const filtered=players.filter(p=>{
    if(p.pos!==pickPos) return false;
    if(searchVal && !p.namn.toLowerCase().includes(searchVal)) return false;
    if(teamFilter && String(p.teamId)!==teamFilter) return false;
    return true;
  });
  const usedTeams = usedTeamIds(null);

  const posTabs=POSITIONS.map(pos=>{
    const have=(picks[pos]||[]).length, need=POS_COUNT[pos];
    const full=have>=need;
    const active=pickPos===pos;
    const bg=full?POS_COLOR[pos].bg:"var(--color-background-primary)";
    const fc=full?POS_COLOR[pos].fc:"var(--color-text-secondary)";
    return `<button data-act="pos-tab" data-pos="${pos}" style="flex:1;padding:8px 2px;border-radius:6px;border:${active?`1.5px solid ${G_GREEN}`:"0.5px solid var(--color-border-secondary)"};background:${bg};color:${fc};font-size:11px;font-weight:500;cursor:pointer">${pos} ${have}/${need}</button>`;
  }).join("");

  const rows=filtered.map(p=>{
    const sel=(picks[p.pos]||[]).includes(p.id);
    const isCap=kap===p.id;
    const team=TEAMS.find(t=>t.id===p.teamId);
    const c=POS_COLOR[p.pos];
    const teamTaken = !sel && usedTeams.includes(p.teamId);
    const posFull = !sel && (picks[p.pos]||[]).length >= POS_COUNT[p.pos];
    const disabled = teamTaken || posFull;
    return `
    <div class="fg-card" style="margin-bottom:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;opacity:${disabled?0.45:1}">
      <div class="fg-posbadge" style="width:34px;height:34px;background:${c.bg};color:${c.fc};font-size:11px">${p.pos}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:${sel?500:400}">${esc(p.namn)}</div>
        <div style="font-size:12px;color:var(--color-text-secondary)">${esc(team?team.name:"")}${teamTaken?' · lag redan valt':''}</div>
      </div>
      ${sel?`<button data-act="toggle-cap" data-id="${p.id}" style="background:${isCap?G_GOLDL:"var(--color-background-secondary)"};border:0.5px solid ${isCap?G_GOLD:"#ccc"};color:${isCap?G_GOLD:"var(--color-text-secondary)"};border-radius:20px;padding:3px 10px;cursor:pointer;font-size:12px;font-weight:500">${isCap?"★ Kapten":"☆"}</button>`:""}
      <button data-act="pick-player" data-id="${p.id}" ${disabled?"disabled":""} style="width:32px;height:32px;border-radius:50%;background:${sel?G_GREENL:"var(--color-background-secondary)"};border:0.5px solid ${sel?G_GREEN:"#ccc"};color:${sel?G_GREEN:"var(--color-text-secondary)"};display:flex;align-items:center;justify-content:center;cursor:${disabled?"not-allowed":"pointer"};font-size:16px;flex-shrink:0">${sel?"✓":"+"}</button>
    </div>`;
  }).join("");

  const missing = pickMissingText();

  return `
  <div style="min-height:100vh;padding-bottom:90px">
    <div class="fg-top">
      <button data-act="back-to-main" style="background:none;border:none;color:#fff;cursor:pointer;font-size:20px;padding:0">←</button>
      <span style="font-weight:500;font-size:16px">Bygg ditt 4-3-3-lag</span>
    </div>
    <div style="padding:12px 16px 0">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input id="player-search" type="search" placeholder="🔍 Sök spelare..." oninput="window._playerSearchRender&&window._playerSearchRender()" style="flex:1;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:13px;background:var(--color-background-secondary)"/>
        <select id="team-filter" onchange="window._playerSearchRender&&window._playerSearchRender()" style="padding:8px;border:0.5px solid var(--color-border-secondary);border-radius:8px;font-size:12px;background:var(--color-background-secondary);max-width:130px">
          <option value="">Alla lag</option>
          ${TEAMS.sort((a,b)=>a.name.localeCompare(b.name)).map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join("")}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:var(--color-background-secondary);border-radius:6px;padding:10px 8px;text-align:center">
          <div style="font-size:11px;color:var(--color-text-secondary)">Spelare valda</div>
          <div style="font-size:18px;font-weight:500">${totalPicked} / ${TOTAL_PICKS}</div>
        </div>
        <div style="background:${kap?G_GOLDL:"var(--color-background-secondary)"};border-radius:6px;padding:10px 8px;text-align:center">
          <div style="font-size:11px;color:${kap?G_GOLD:"var(--color-text-secondary)"}">Kapten</div>
          <div style="font-size:16px;font-weight:500;color:${kap?G_GOLD:"var(--color-text-primary)"}">${kap?esc((players.find(p=>p.id===kap)||{namn:""}).namn.split(" ")[0]):"Ej vald"}</div>
        </div>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:10px">${posTabs}</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">⚠️ Max en spelare per lag totalt i hela laget</div>
      ${pickErr?`<div style="font-size:12px;color:#A32D2D;margin-bottom:8px;font-weight:500">${esc(pickErr)}</div>`:""}
      <div style="font-size:13px;font-weight:500;margin-bottom:6px">${POS_LABEL[pickPos]}</div>
    </div>
    <div id="player-list" style="padding:0 16px">${rows || '<div style="font-size:13px;color:var(--color-text-secondary)">Inga spelare hittades.</div>'}</div>
    <div style="position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:12px 16px;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary)">
      ${missing?`<div style="font-size:12px;color:#A32D2D;margin-bottom:8px;text-align:center;font-weight:500">${esc(missing)}</div>`:""}
      <button class="fg-btn" data-act="save-team">Spara mitt lag →</button>
    </div>
  </div>`;
}

        ${table([
          ["Alla 3 rätt","Streak +1 🔥"],
          ["En eller fler fel","Streak nollställs"],

        <div style="font-size:13px;color:var(--color-text-secondary);margin-top:10px;line-height:1.5">

function renderMain(){
  const sorted=sortedUsers();
  const tabsDef = appMode==="statistik"
    ? [["statistik","📈","Statistik"],["adm","🔒","Admin"]]
    : appMode==="streak"
    ? [["hem","🏠","Hem"],["regler","📋","Regler"],["liga","📊","Liga"],["adm","🔒","Admin"]]
    : appMode==="hof"
    ? [["hof","🏆","Hall of Fame"],["adm","🔒","Admin"]]
    : appMode==="profil"
    ? [["profil","👤","Profil"],["adm","🔒","Admin"]]
    : [["hem","🏠","Hem"],["regler","📋","Regler"],["liga","📊","Liga"],["adm","🔒","Admin"]];
  // Rundstripp för alla spelformer
  const allRoundKeys=Object.keys(rounds).map(Number).sort((a,b)=>a-b);
  const showRoundStrip=appMode!=="statistik"&&appMode!=="ligatipp"&&appMode!=="hof"&&allRoundKeys.length>0;
  const roundStrip=showRoundStrip?`
    <div style="background:#1a1a1a;padding:6px 12px 8px">
      <div style="display:grid;grid-template-columns:repeat(13,1fr);gap:3px">
      ${Array.from({length:26},(_,i)=>i+1).map(r=>{
        const rd=rounds[String(r)];
        const isActive=r===cfg.omg;
        if(!rd) return `<div style="height:26px;border-radius:5px;background:#333;opacity:0.3"></div>`;
        const bg=isActive?"#fff":rd.results_published?"#2d5a2d":rd.locked?"#5a1a1a":"#333";
        const col=isActive?"#1a1a1a":rd.results_published?"#a8e6a8":rd.locked?"#ffaaaa":"#aaa";
        return `<button data-act="user-jump-round" data-r="${r}" style="height:26px;border-radius:5px;border:none;background:${bg};color:${col};font-size:11px;font-weight:${isActive?700:500};cursor:pointer;width:100%">${r}</button>`;
      }).join("")}
      </div>
    </div>`:"";

  let body="";
  if(mainTab==="hem"){
    if(appMode==="fantasy"||appMode===null) body=renderHemTab(sorted);
    else if(appMode==="tipp") body=renderTippTab();
    else if(appMode==="ligatipp") body=renderLigatippTab();
    else if(appMode==="snabbast") body=renderSnabbastTab();
    else if(appMode==="måljakten") body=renderMåljaktenTab();
    else if(appMode==="quiz") body=renderQuizTab();
    else if(appMode==="streak") body=renderStreakTab();
    else body=renderHemTab(sorted);
  }
  else if(mainTab==="regler") body=renderRegler();
  else if(mainTab==="liga") body=renderLigaTab(sorted);
  else if(mainTab==="statistik") body=renderStatistikTab();
  else if(mainTab==="hof") body=renderHofTab();
  else if(mainTab==="profil") body=renderProfilTab();
  else if(mainTab==="omg") body=renderOmgTab();
  else body=renderAdminTab();

  const tabs=tabsDef.map(([id,ico,lbl])=>`<button class="fg-tabbtn ${mainTab===id?'active':''}" data-act="main-tab" data-tab="${id}"><span style="font-size:18px">${ico}</span><span>${lbl}</span></button>`).join("");

  // Rundväljare – bara synlig i Fantasy-läget
  const roundKeys=Object.keys(rounds).map(Number).sort((a,b)=>a-b);

  return `
  <div style="min-height:100vh">
    <div class="fg-top"><svg width="14" height="14" viewBox="0 0 10 10" style="flex-shrink:0"><polygon points="5,0 10,5 5,10 0,5" fill="#c1272d"/></svg><span style="font-weight:500;flex:1;font-family:Georgia,serif;font-style:italic">${esc(currentLeague.name)}${appMode==="tipp"?" · Tipp":appMode==="ligatipp"?" · Tippa serien":appMode==="snabbast"?" · Snabbast":appMode==="måljakten"?" · Måljakten":""}</span>${currentLeague.season?`<span style="font-size:10px;color:rgba(255,255,255,0.5);margin-right:8px">${currentLeague.season}</span>`:""}<button data-act="switch-mode" style="background:none;border:none;color:#fff;cursor:pointer;font-size:11px;text-decoration:underline;opacity:.85;padding:0;margin-right:8px">Byt läge</button><button data-act="switch-league" style="background:none;border:none;color:#fff;cursor:pointer;font-size:11px;text-decoration:underline;opacity:.85;padding:0">Byt serie</button></div>
    <div class="fg-topbar-tabs">${tabs}</div>
    ${roundStrip}
    <div style="padding:12px 16px 24px">${body}</div>
  </div>`;
}

function renderHemTab(sorted){
  const user=currentUser;
  if(!user)return "";
  const totP=userTotPts(user);
  const omgP=userRoundPts(user,cfg.omg);
  const rank=sorted.findIndex(u=>u.id===user.id)+1;
  const harLag=user.picks && pickCount(user)===TOTAL_PICKS && user.kapten;

  let teamHtml="";
  if(harLag){
    const rd=rounds[String(cfg.omg)];
    teamHtml = `<div class="fg-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">
        <div style="font-weight:500">Mitt lag (4-3-3)</div>
        <button data-act="edit-team" style="background:none;border:none;color:${G_GREEN};font-size:12px;cursor:pointer">✏ Byt</button>
      </div>
      ${POSITIONS.map(pos=>{
        const ids=user.picks[pos]||[];
        return ids.map(pid=>{
          const pl=players.find(p=>p.id===pid);
          if(!pl)return "";
          const isCap=pl.id===user.kapten;
          const pts=plPts(pl,rd);
          const team=TEAMS.find(t=>t.id===pl.teamId);
          const c=POS_COLOR[pos];
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
            <div class="fg-posbadge" style="width:30px;height:30px;background:${c.bg};color:${c.fc};font-size:9px">${pos}</div>
            <div style="flex:1"><div style="font-size:14px">${esc(pl.namn)}</div><div style="font-size:11px;color:var(--color-text-secondary)">${esc(team?team.name:"")}</div></div>
            ${isCap?`<span style="background:${G_GOLDL};color:${G_GOLD};border-radius:20px;padding:2px 8px;font-size:11px;font-weight:500">★</span>`:""}
            <div style="font-weight:500;font-size:14px">${(rd&&rd.results_published)?(isCap?pts*2:pts):"–"} p</div>

function renderPrivateLeagueSection(gameMode){
  const gameModeLabel={fantasy:"Fantasy",tipp:"Tippa resultat",snabbast:"Snabbast vinner",måljakten:"Måljakten",ligatipp:"Tippa serien"}[gameMode]||gameMode;
  const myLeagues=allPrivateLeagues.filter(l=>(l.game_mode===gameMode||l.game_mode==="alla")&&l.approved&&l.private_league_members&&l.private_league_members.some(m=>m.user_id===currentUser.id));
  const pending=allPrivateLeagues.filter(l=>l.game_mode===gameMode&&!l.approved&&l.created_by===currentUser.id);

  // Get points function for this game mode
  const getPts=(u)=>{
    if(gameMode==="fantasy") return userTotPts(u);
    if(gameMode==="tipp") return userTipTotalPts(u);
    if(gameMode==="snabbast") return userSnabbastTotalPts(u.id);
    if(gameMode==="måljakten") return userMåljaktenTotalPts(u.id);
    if(gameMode==="ligatipp") return userLigatippTotalPts(allLeagueTips.find(t=>t.user_id===u.id)||{});
    if(gameMode==="alla") return userTotPts(u)+userTipTotalPts(u)+userSnabbastTotalPts(u.id)+userMåljaktenTotalPts(u.id);
    return 0;
  };

  // Standings for selected private league
  let standingsHtml="";
  if(privateLeagueView){
    const pl=allPrivateLeagues.find(l=>l.id===privateLeagueView);
    if(pl&&pl.private_league_members){
      const memberIds=pl.private_league_members.map(m=>m.user_id);
      const snapshot=pl.standings_snapshot||{};
      const memberUsers=users.filter(u=>memberIds.includes(u.id)).sort((a,b)=>getPts(b)-getPts(a));
      const medals=["🥇","🥈","🥉"];
      standingsHtml=`<div class="fg-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-weight:500">${esc(pl.name)}</div>
          <button data-act="pl-close" style="background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px">✕ Stäng</button>
        </div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:10px">${pl.game_mode==="alla"?"🏆 Alla spel – totalpoäng":"Inbjudningskod:"} <b style="color:${G_GREEN};letter-spacing:2px">${pl.invite_code}</b> · Dela med vänner!</div>
        ${memberUsers.map((u,i)=>{
          const rank=i+1;
          const isMe=u.id===currentUser.id;
          const prevRank=snapshot[u.id];
          const trend=prevRank===undefined?"":rank<prevRank?`<span style="color:#16a34a;font-size:14px">▲</span>`:rank>prevRank?`<span style="color:#c1272d;font-size:14px">▼</span>`:`<span style="color:var(--color-text-secondary);font-size:14px">–</span>`;
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);${isMe?"background:"+G_GREENL+";border-radius:6px;padding-left:6px;padding-right:6px":""}">
            <span style="width:22px;text-align:center">${rank<=3?medals[rank-1]:rank}</span>
            <span style="flex:1;font-size:14px;font-weight:${isMe?500:400}">${esc(u.namn)}${isMe?" (du)":""}</span>
            ${trend}
            <span style="font-weight:500">${getPts(u)} p</span>
          </div>`;
        }).join("")}
      </div>`;
    }
  }

  const ligaList=myLeagues.map(pl=>`
    <button data-act="pl-view" data-id="${pl.id}" style="display:flex;align-items:center;gap:10px;width:100%;background:${privateLeagueView===pl.id?G_GREENL:"var(--color-background-secondary)"};border:1px solid ${privateLeagueView===pl.id?G_GREEN:"var(--color-border-secondary)"};border-radius:8px;padding:10px 12px;cursor:pointer;text-align:left;margin-bottom:6px">
      <span style="font-size:18px">👥</span>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500">${esc(pl.name)}</div>
        <div style="font-size:11px;color:var(--color-text-secondary)">${(pl.private_league_members||[]).length} deltagare · Kod: ${pl.invite_code}</div>
      </div>
      <span style="color:var(--color-text-secondary)">›</span>
    </button>`).join("");

  const pendingHtml=pending.map(pl=>`
    <div style="background:#fffbeb;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:13px">
      ⏳ <b>${esc(pl.name)}</b> väntar på godkännande av admin
    </div>`).join("");

  return `<div class="fg-card" style="margin-top:10px">
    <div style="font-weight:500;margin-bottom:10px">👥 Mina privata ligor – ${gameModeLabel}</div>
    ${standingsHtml}
    ${ligaList}
    ${pendingHtml}
    <div style="display:flex;gap:8px;margin-top:8px">
      <button data-act="pl-create" data-mode="${gameMode}" class="fg-outbtn" style="flex:1;padding:8px">+ Skapa liga</button>
      <button data-act="pl-join-open" class="fg-outbtn" style="flex:1;padding:8px">Gå med med kod</button>
    </div>
    <div id="pl-join-area-${gameMode}"></div>
  </div>`;
}

function renderQuizTab(){
  const rnd=cfg.omg;
  const qs=quizQuestions.filter(q=>q.round_num===rnd); // bara denna omgångs frågor
  const answers=quizMyAnswers;
  const answeredAll=qs.length>0&&qs.every(q=>answers[q.id]);
  const timeLeft=qs.length>0?getQuizTimeLeft(rnd):300;
  const timedOut=timeLeft<=0;
  const done=answeredAll||timedOut;
  const pts=calcQuizPts(qs,answers);
  const allAnswers=window._quizAllAnswers||[];
  const allQs=quizQuestions;

  // Start timer if quiz is open and not done
  if(qs.length>0&&!done){
    startQuizTimer(rnd);
  } else {
    stopQuizTimer();
  }

  if(!qs.length) return `
    <div style="font-weight:500;font-size:16px;margin-bottom:12px">🧠 Div2NG Quiz</div>
    <div class="fg-card" style="text-align:center;padding:30px 16px">
      <div style="font-size:40px;margin-bottom:12px">🧠</div>
      <div style="font-weight:500;margin-bottom:8px">Inga frågor den här omgången ännu</div>
      <div style="font-size:13px;color:var(--color-text-secondary)">Admin lägger in frågor inför varje omgång.</div>
    </div>`;

  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const timerColor=timeLeft<=30?"#c1272d":timeLeft<=60?"#e65100":"var(--color-text-primary)";

  const questionCards=qs.map((q,i)=>{
    const myAns=answers[q.id];
    const locked=!!myAns||done;
    const isCorrect=myAns===q.correct;

    const altBtn=(val,label)=>{
      const chosen=myAns===val;
      const correct=done&&q.correct===val;
      const wrong=done&&chosen&&!isCorrect&&val===myAns;
      let bg="var(--color-background-secondary)";
      let border="var(--color-border-secondary)";
      let col="var(--color-text-primary)";
      if(correct){bg="#e8f5ee";border="#1a6b3c";col="#1a6b3c";}
      else if(wrong){bg="#fce8e8";border="#c1272d";col="#c1272d";}
      else if(chosen&&!done){bg=G_GREENL;border=G_GREEN;col=G_GREEN;}
      return `<button data-act="quiz-answer" data-qid="${q.id}" data-ans="${val}" data-rnd="${rnd}" ${locked?"disabled":""} style="flex:1;padding:10px 6px;border-radius:8px;border:1.5px solid ${border};background:${bg};color:${col};font-size:13px;font-weight:500;cursor:${locked?"default":"pointer"};transition:.15s">
        <div style="font-weight:700;font-size:11px;margin-bottom:2px">${val}</div>
        <div style="font-size:12px">${esc(label)}</div>
      </button>`;
    };

    const statusBadge=myAns?(isCorrect?`<span style="color:#1a6b3c;font-size:12px;font-weight:500">✓ Rätt! +1p</span>`:`<span style="color:#c1272d;font-size:12px;font-weight:500">✗ Fel (rätt: ${q.correct})</span>`):(done?`<span style="color:var(--color-text-secondary);font-size:12px">Ej besvarad – 0p</span>`:"");

    return `<div class="fg-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="font-size:11px;color:var(--color-text-secondary)">Fråga ${i+1} av ${qs.length}</div>
        ${statusBadge}
      </div>
      <div style="font-size:15px;font-weight:500;margin-bottom:14px;line-height:1.4">${esc(q.question)}</div>
      <div style="display:flex;gap:8px">
        ${altBtn("1",q.alt1)}
        ${altBtn("X",q.altx)}
        ${altBtn("2",q.alt2)}
      </div>
    </div>`;
  }).join("");

  // Topplista
  const medals=["🥇","🥈","🥉"];
  const quizSorted=[...users].sort((a,b)=>userQuizTotalPts(b.id,allAnswers,allQs)-userQuizTotalPts(a.id,allAnswers,allQs));
  const quizLeaderboard=`<div class="fg-card">
    <div style="font-weight:500;margin-bottom:10px">🏆 Topplista – Div2NG Quiz</div>
    ${quizSorted.map((u,i)=>{
      const p=userQuizTotalPts(u.id,allAnswers,allQs);
      const isMe=u.id===currentUser.id;
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);${isMe?"background:"+G_GREENL+";border-radius:6px;padding-left:6px;padding-right:6px":""}">
        <span style="width:22px;text-align:center">${i<3?medals[i]:i+1}</span>
        <span style="flex:1;font-size:14px;font-weight:${isMe?500:400}">${esc(u.namn)}${isMe?" (du)":""}</span>
        <span style="font-weight:500">${p} p</span>
      </div>`;
    }).join("")}
  </div>`;

  return `
  <div style="font-weight:500;font-size:16px;margin-bottom:4px">🧠 Div2NG Quiz – Omgång ${rnd}</div>
  ${!qs.length?`<div class="fg-card" style="text-align:center;padding:24px"><div style="font-size:36px;margin-bottom:8px">🧠</div><div style="font-weight:500">Inga frågor den här omgången ännu</div></div>`:""}
  ${qs.length&&!done?`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:10px;padding:10px 16px;margin-bottom:12px">
    <div style="font-size:13px;color:var(--color-text-secondary)">⏱ Tid kvar</div>
    <div id="quiz-timer" style="font-size:28px;font-weight:700;font-family:monospace;color:${timeLeft<=30?"#c1272d":timeLeft<=60?"#e65100":"var(--color-text-primary)"}">${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,"0")}</div>
    <div style="font-size:13px;color:var(--color-text-secondary)">${Object.keys(answers).length}/${qs.length} svarade</div>
  </div>`:""}
  ${qs.length&&done?`<div class="fg-card" style="text-align:center;background:${pts===qs.length?"#e8f5ee":"var(--color-background-primary)"}">
    <div style="font-size:36px;margin-bottom:6px">${pts===qs.length?"🏆":pts>=3?"🎯":"📚"}</div>
    <div style="font-size:22px;font-weight:700;color:${G_GREEN}">${pts} / ${qs.length} rätt</div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-top:4px">${timedOut&&!answeredAll?"Tiden tog slut!":"Quiz klar!"}</div>
  </div>`:""}
  ${questionCards}
  ${quizLeaderboard}`;
}

function renderStreakTab(){
  const rd=rounds[String(cfg.omg)];
  const matches=rd?.matches||[];
  const locked=rd?.locked||false;
  const published=rd?.results_published||false;
  const myTip=streakMyTips.find(t=>t.round_num===cfg.omg);
  const publishedRounds=Object.keys(rounds).filter(r=>rounds[r].results_published).map(Number);
  const {current,best}=calcUserStreak(streakAllTips,currentUser.id,publishedRounds);

  // Streak-status
  const streakBar=`<div class="fg-card" style="display:flex;gap:0;padding:0;overflow:hidden">
    <div style="flex:1;padding:14px;text-align:center;border-right:0.5px solid var(--color-border-tertiary)">
      <div style="font-size:28px;font-weight:700;color:#e65100">${current}🔥</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">Aktiv streak</div>
    </div>
    <div style="flex:1;padding:14px;text-align:center">
      <div style="font-size:28px;font-weight:700;color:${G_GREEN}">${best}</div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">Bästa streak</div>
    </div>
  </div>`;

  // Visa resultatet om publicerat
  if(published&&myTip){
    const picks=myTip.picks||{};
    const picksHtml=Object.entries(picks).map(([mIdx,sign])=>{
      const m=matches[Number(mIdx)];
      if(!m)return"";
      const h=TEAMS.find(t=>t.id===m.hId),a=TEAMS.find(t=>t.id===m.aId);
      const hg=rd.goals?.[m.id]?.h??m.hMål;const ag=rd.goals?.[m.id]?.a??m.aMål;
      const actual=hg>ag?"1":hg<ag?"2":"X";
      const correct=sign===actual;
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
        <span style="font-size:18px">${correct?"✅":"❌"}</span>
        <div style="flex:1;font-size:13px">${esc(h?.name||"")} – ${esc(a?.name||"")}</div>
        <span style="font-weight:500">${sign}</span>
        <span style="font-size:12px;color:var(--color-text-secondary)">(${actual})</span>
      </div>`;
    }).join("");
    return `${streakBar}
    <div class="fg-card">
      <div style="font-weight:500;margin-bottom:8px">🔥 Omgång ${cfg.omg} – ditt tips</div>
      ${picksHtml}
      <div style="padding-top:8px;font-weight:600;color:${myTip.correct?G_GREEN:"#c1272d"}">
        ${myTip.correct?"✅ Alla 3 rätt – streak fortsätter!":"❌ Streak nollställd"}
      </div>
    </div>`;
  }

  // Välj matcher
  if(myTip&&!published){
    const picks=myTip.picks||{};
    const picksHtml=Object.entries(picks).map(([mIdx,sign])=>{
      const m=matches[Number(mIdx)];
      const h=TEAMS.find(t=>t.id===m?.hId),a=TEAMS.find(t=>t.id===m?.aId);
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px">
        <div style="flex:1">${esc(h?.name||"")} – ${esc(a?.name||"")}</div>
        <span style="font-weight:600;background:#1a1a1a;color:#fff;border-radius:4px;padding:2px 8px">${sign}</span>
      </div>`}).join("");
    return `${streakBar}
    <div class="fg-card" style="background:${S_GREENL};border:1px solid ${S_GREEN}">
      <div style="font-weight:500;margin-bottom:8px;color:${S_GREEN}">✅ Tips inlämnat – Omgång ${cfg.omg}</div>
      ${picksHtml}
    </div>`;
  }

  if(locked&&!myTip){
    return `${streakBar}
    <div class="fg-card" style="text-align:center;padding:24px">
      <div style="font-size:32px;margin-bottom:8px">🔒</div>
      <div style="font-weight:500">Tippningen är stängd</div>
      <div style="font-size:13px;color:var(--color-text-secondary);margin-top:4px">Streak nollställs om du inte tippat.</div>
    </div>`;
  }

  if(!matches.length){
    return `${streakBar}
    <div class="fg-card" style="text-align:center;padding:24px">
      <div style="font-size:32px">📅</div>
      <div style="font-weight:500;margin-top:8px">Inga matcher för omgång ${cfg.omg} ännu</div>
      <div style="font-size:11px;color:#999;margin:8px 0;font-family:monospace">
        cfg.omg=${cfg.omg} · rounds=${Object.keys(rounds).join(",")} · rd=${rd?"finns":"saknas"}
      </div>
      <button data-act="streak-reload" style="background:#1a1a1a;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px">🔄 Ladda om matcher</button>
    </div>`;
  }

  // Väljargränssnittet
  const draft=streakDraft;
  const selected=Object.keys(draft).length;
  const matchCards=matches.map((m,i)=>{
    const h=TEAMS.find(t=>t.id===m.hId),a=TEAMS.find(t=>t.id===m.aId);
    const picked=draft[i]!==undefined;
    const signs=["1","X","2"];
    return `<div class="fg-card" style="margin-bottom:8px;border:${picked?`1.5px solid ${G_GREEN}`:"0.5px solid var(--color-border-tertiary)"}">
      <div style="font-size:13px;font-weight:500;margin-bottom:8px;text-align:center">${esc(h?.name||"")} – ${esc(a?.name||"")}</div>
      <div style="display:flex;gap:6px">
        ${signs.map(s=>`<button data-act="streak-pick" data-idx="${i}" data-sign="${s}"
          style="flex:1;padding:8px;border-radius:6px;border:1.5px solid ${draft[i]===s?G_GREEN:"var(--color-border-secondary)"};
          background:${draft[i]===s?G_GREENL:"var(--color-background-primary)"};
          color:${draft[i]===s?G_GREEN:"var(--color-text-secondary)"};
          font-weight:${draft[i]===s?700:400};cursor:pointer;font-size:14px">${s}</button>`).join("")}
      </div>
    </div>`;
  }).join("");

  return `${streakBar}
  <div style="font-weight:500;font-size:15px;margin-bottom:4px">🔥 Streak – Omgång ${cfg.omg}</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:12px">Välj <b>3 matcher</b> och tippa 1, X eller 2. Alla 3 rätt = streak fortsätter!</div>
  ${matchCards}
  <button class="fg-btn" data-act="submit-streak" ${selected<3?"disabled":""} style="margin-top:4px;${selected<3?"opacity:0.5":""}">
    ${selected<3?`Välj ${3-selected} match${3-selected===1?"":"er"} till`:"✅ Lämna in tips"}
  </button>`;
}

      ${bars}

  <div class="fg-card">

      <button data-act="delete-account" style="background:none;border:0.5px solid #c1272d;color:#c1272d;border-radius:6px;padding:8px 14px;font-size:12px;cursor:pointer;${Object.keys(rounds).length<26||!rounds["26"]?.results_published?"opacity:0.4;cursor:not-allowed":""}">

  else if(appMode==="tipp"){title="📊 Tippligan";getPts=u=>userTipTotalPts(u);subText=u=>`${Object.keys(u.tips||{}).filter(k=>(u.tips[k]||[]).length>0).length} omgångar tippade`;}
  else if(appMode==="snabbast"){title="📊 Snabbast-ligan";getPts=u=>userSnabbastTotalPts(u.id);subText=u=>`${userSnabbastTotalPts(u.id)} p totalt`;}
  else if(appMode==="måljakten"){title="📊 Målligan";getPts=u=>userMåljaktenTotalPts(u.id);subText=u=>`${userMåljaktenTotalPts(u.id)} p totalt`;}
  else if(appMode==="ligatipp"){title="📊 Serietipps-ligan";getPts=u=>userLigatippTotalPts(allLeagueTips.find(t=>t.user_id===u.id)||{});subText=u=>`${getPts(u)} p totalt`;}

  return `

function renderOmgTab(){

  // Grid – samma stil som admin men med användarinfo
  const gridBtns=Array.from({length:26},(_,i)=>i+1).map(n=>{
    const rd=rounds[String(n)];
    const isActive=openRounds.has(n);

    // Kolla om användaren tippar på denna omgång
    const hasTipp = currentUser && currentUser.tips && currentUser.tips[String(n)] && currentUser.tips[String(n)].length>0;
    const hasSnabbast = snabbastMyTips && snabbastMyTips[n] && snabbastMyTips[n].length>0;
    const hasMåljakten = måljaktenMyTips && måljaktenMyTips[n] && måljaktenMyTips[n].length>0;
    const hasAnyTip = hasTipp||hasSnabbast||hasMåljakten;

    let bg,col,border;
    if(!rd){
      bg="var(--color-background-secondary)"; col="var(--color-text-secondary)"; border="transparent";
    } else if(rd.results_published){
      bg=S_AMBERL; col=S_AMBER; border=S_AMBER;
    } else if(rd.locked){
      bg="#fce8e8"; col="#c1272d"; border="#c1272d";
    } else {
      bg=hasAnyTip?"#fff3e0":"var(--color-background-primary)";
      col=hasAnyTip?"#e65100":"var(--color-text-secondary)";
      border=isActive?"#1a1a1a":(hasAnyTip?"#e65100":"var(--color-border-secondary)");
    }

    return `<button data-act="toggle-round" data-r="${n}" style="aspect-ratio:1;border-radius:8px;border:1.5px solid ${border};background:${bg};color:${col};font-size:13px;font-weight:${isActive?700:500};cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center">
      ${n}
      ${hasAnyTip&&!rd?.results_published?`<span style="position:absolute;top:2px;right:3px;font-size:7px;color:#e65100">✓</span>`:""}
    </button>`;
  }).join("");

  // Förklaring
  const legend=`<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px;margin-top:10px">
    <span style="color:${S_GREEN}">■ Resultat klara</span>
    <span style="color:#c1272d">■ Tippning stängd</span>
    <span style="color:#e65100">■ Tips lagd</span>
    <span style="color:var(--color-text-secondary)">□ Ej inlagd</span>
  </div>`;

  // Detaljvy per öppen omgång
  const details=keys.filter(r=>openRounds.has(r)).map(r=>{
    const rd=rounds[String(r)];
    const matchRows=(rd.matches||[]).map(m=>{
      const h=TEAMS.find(t=>t.id===m.hId),a=TEAMS.find(t=>t.id===m.aId);
      return `<div style="display:flex;gap:6px;padding:6px 0;font-size:13px;border-bottom:0.5px solid var(--color-border-tertiary)">
        <span style="flex:1;text-align:right">${esc(h?h.name:"")}</span>
        <span style="background:var(--color-background-secondary);border-radius:4px;padding:2px 8px;font-weight:500;min-width:44px;text-align:center">${rd.results_published?m.hMål+"–"+m.aMål:"vs"}</span>
        <span style="flex:1">${esc(a?a.name:"")}</span>
      </div>`;
    }).join("");

    const ptsRows=rd.results_published?[...users].sort((a,b)=>userRoundPts(b,r)-userRoundPts(a,r)).map(u=>{
      const pts=userRoundPts(u,r);
      const isMe=u.id===currentUser.id;
      return `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;${isMe?"font-weight:500":""}">
        <span>${esc(u.namn)}${isMe?" (du)":""}</span><span>${pts} p</span>
      </div>`;
    }).join(""):"";

    return `<div class="fg-card" style="margin-top:10px">
      <div style="font-weight:500;margin-bottom:8px;display:flex;justify-content:space-between">
        <span>Omgång ${r}</span>
        ${rd.results_published?`<span style="font-size:12px;color:${S_AMBER}">✅ Resultat klara</span>`:rd.locked?`<span style="font-size:12px;color:#c1272d">🔒 Stängd</span>`:`<span style="font-size:12px;color:${S_GREEN}">🟢 Öppen</span>`}
      </div>
      ${matchRows||'<div style="font-size:13px;color:var(--color-text-secondary)">Matcher ej inlagda.</div>'}
      ${rd.results_published?`<div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px">Fantasy-poäng</div>${ptsRows}
      </div>`:""}
    </div>`;
  }).join("");

  if(!keys.length) return `
    <div style="font-weight:500;font-size:16px;margin-bottom:12px">📅 Omgångar</div>
    <div class="fg-card" style="text-align:center;color:var(--color-text-secondary);font-size:13px">Inga omgångar inlagda ännu.</div>`;

  return `
  <div style="font-weight:500;font-size:16px;margin-bottom:12px">📅 Omgångar</div>
  <div class="fg-card">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">${gridBtns}</div>
    ${legend}
  </div>
  ${details}`;
}

function adminDefaultRound(){
  // Hitta första öppna (ej låsta) omgången, annars senaste inlagda
  const keys=Object.keys(rounds).map(Number).sort((a,b)=>a-b);
  const firstOpen=keys.find(r=>!rounds[String(r)].locked);
  if(firstOpen) return String(firstOpen);
  if(keys.length) return String(keys[keys.length-1]);
  return String(cfg.omg);
}

function defaultBulkRows(rndKey){
  const existing = rounds[rndKey];
  if(existing && existing.matches.length){
    return existing.matches.map(m=>({hId:m.hId,aId:m.aId,hMål:m.hMål,aMål:m.aMål}));
  }
  const rows=[];
  for(let i=0;i<TEAMS.length;i+=2){
    if(TEAMS[i+1]) rows.push({hId:TEAMS[i].id,aId:TEAMS[i+1].id,hMål:0,aMål:0});
  }
  return rows;
}

function parseScheduleText(text){
  const cleaned=text.replace(/ emblem/g,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");

  const normalizeStr=s=>s.toLowerCase().replace(/\s+/g," ").trim();

  const findTeamFromLine=line=>{
    const lower=normalizeStr(line);
    const sorted=[...TEAMS].sort((a,b)=>b.name.length-a.name.length);
    for(const t of sorted){
      const tn=normalizeStr(t.name);
      // Exakt match
      if(lower===tn)return t;
      // Raden börjar med lagnamnet följt av mellanslag
      if(lower.startsWith(tn+" "))return t;
      // Raden börjar med lagnamnet följt av lagnamnet igen (duplikat utan mellanslag)
      if(lower.startsWith(tn+tn.slice(-1)))return t;
      // Lagnamnet innehåller radens text (om raden är förkortad)
      if(tn.startsWith(lower+" ")||tn===lower)return t;
    }
    // Sista utväg: matcha på de första 2 orden (hanterar stavningsskillnader)
    for(const t of sorted){
      const tnWords=normalizeStr(t.name).split(" ");
      const lineWords=lower.split(" ");
      const compareLen=Math.min(2,tnWords.length,lineWords.length);
      if(tnWords.slice(0,compareLen).join(" ")===lineWords.slice(0,compareLen).join(" ")){
        return t;
      }
    }
    return null;
  };

  const sections=cleaned.split(/(?=^Omgång\s+\d+)/m);
  const results=[];

  for(const section of sections){
    const roundMatch=section.match(/^Omgång\s+(\d+)/);
    if(!roundMatch)continue;
    const roundNum=Number(roundMatch[1]);
    const lines=section.split("\n").map(l=>l.trim()).filter(l=>l.length>0);

    const foundTeams=[];
    const skippedLines=[];

    for(const line of lines){
      if(/^Omgång\s+\d+/.test(line))continue;
      if(/^\d{1,2}:\d{2}/.test(line))continue;
      if(/^Publik:/i.test(line))continue;
      if(/^\d+$/.test(line))continue; // skippa rena siffror
      const t=findTeamFromLine(line);
      if(t){
        foundTeams.push(t);
      } else {
        skippedLines.push(line);
      }
    }

    const matches=[];
    const errors=[];
    for(let i=0;i+1<foundTeams.length;i+=2){
      matches.push({hId:foundTeams[i].id,aId:foundTeams[i+1].id,hRaw:foundTeams[i].name,aRaw:foundTeams[i+1].name});
    }
    if(foundTeams.length%2!==0){
      const leftover=foundTeams[foundTeams.length-1].name;
      errors.push(`Lag utan motståndare: "${leftover}"`);
      if(skippedLines.length) errors.push(`Rader som inte matchades: ${skippedLines.map(l=>`"${l}"`).join(", ")}`);
    }

    results.push({roundNum,matches,errors});
  }

  return results;
}

function attachHandlers(){
  // Admin login – synkron fallback via window-funktion
  window._doAdminLogin=async function(){
    const pwd=document.getElementById("admin-pwd")?.value||"";
    errMsg="Loggar in…"; render();
    try{
      // Försök som superadmin först, sedan vanlig admin
      let {data,error}=await sb.auth.signInWithPassword({email:SUPER_ADMIN_EMAIL,password:pwd});
      let level="super";
      if(error){
        ({data,error}=await sb.auth.signInWithPassword({email:ADMIN_EMAIL,password:pwd}));
        level="admin";
      }
      if(error||!data?.user){ errMsg="Fel lösenord."; render(); return; }
      const {data:adminRow,error:adminErr}=await sb.from("admins").select("level").eq("user_id",data.user.id).maybeSingle();
      if(adminErr||!adminRow){ errMsg="Kontot saknar adminbehörighet."; await sb.auth.signOut(); render(); return; }
      adminOk=true; adminLevel=adminRow.level;
      errMsg=""; if(adminLevel!=="super") adminSection="round";
      cfg={...cfg,omg:Number(adminDefaultRound())}; bulkRows=defaultBulkRows(adminDefaultRound());
    }catch(e){console.error(e); errMsg="Något gick fel vid inloggning.";}
    render();
  };

  window._exportTable=function(){
    // Samla ligadata
    let getPts,title;
    if(appMode==="fantasy"||!appMode){getPts=u=>userTotPts(u);title="Fantasy";}
    else if(appMode==="tipp"){getPts=u=>userTipTotalPts(u);title="Tippa resultat";}
    else if(appMode==="snabbast"){getPts=u=>userSnabbastTotalPts(u.id);title="Snabbast vinner";}
    else if(appMode==="måljakten"){getPts=u=>userMåljaktenTotalPts(u.id);title="Måljakten";}
    else if(appMode==="ligatipp"){getPts=u=>userLigatippTotalPts(allLeagueTips.find(t=>t.user_id===u.id)||{});title="Tippa serien";}
    else if(appMode==="quiz"){getPts=u=>userQuizTotalPts(u.id,window._quizAllAnswers||[],quizQuestions);title="Quiz";}
    else{getPts=u=>userTotPts(u);title="Fantasy";}

    const sorted=[...users].sort((a,b)=>getPts(b)-getPts(a));
    const rowH=44,padX=20,padY=20;
    const headerH=80,footerH=40;
    const W=400,H=headerH+sorted.length*rowH+footerH+padY*2;

    const canvas=document.getElementById("export-canvas");
    canvas.width=W; canvas.height=H;
    const ctx=canvas.getContext("2d");

    // Bakgrund
    ctx.fillStyle="#1a1a1a";
    ctx.fillRect(0,0,W,H);

    // Header
    ctx.fillStyle="#c1272d";
    ctx.fillRect(0,0,W,headerH);
    ctx.fillStyle="#fff";
    ctx.font="bold 18px Georgia";
    ctx.textAlign="center";
    ctx.fillText("Div2 Norra Götaland",W/2,32);
    ctx.font="14px Arial";
    ctx.fillText(title+" – Ligatabell",W/2,56);
    ctx.font="11px Arial";
    ctx.fillStyle="rgba(255,255,255,0.7)";
    ctx.fillText(new Date().toLocaleDateString("sv-SE"),W/2,74);

    // Rader
    const medals=["🥇","🥈","🥉"];
    sorted.forEach((u,i)=>{
      const y=headerH+padY+i*rowH;
      // Alternerande bakgrund
      ctx.fillStyle=i%2===0?"#222":"#1e1e1e";
      ctx.fillRect(padX,y,W-padX*2,rowH-2);

      // Placering
      ctx.font="bold 14px Arial";
      ctx.textAlign="center";
      ctx.fillStyle=i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"#888";
      ctx.fillText(i<3?["1","2","3"][i]:String(i+1),padX+16,y+27);

      // Namn
      ctx.font=i<3?"bold 14px Arial":"14px Arial";
      ctx.fillStyle="#fff";
      ctx.textAlign="left";
      ctx.fillText(u.namn.slice(0,22),padX+36,y+27);

      // Poäng
      ctx.font="bold 16px Arial";
      ctx.fillStyle="#c1272d";
      ctx.textAlign="right";
      ctx.fillText(String(getPts(u))+" p",W-padX-4,y+27);

      // Separator
      ctx.fillStyle="#333";
      ctx.fillRect(padX,y+rowH-2,W-padX*2,1);
    });

    // Footer
    ctx.fillStyle="#333";

    }
    else if(act==="switch-mode"){ stopQuizTimer(); screen="mode"; render(); loadMyRoundStatus().then(render); }
    else if(act==="back-to-main"){screen="main";render();}
    else if(act==="pos-tab"){pickPos=el.dataset.pos;render();}
    else if(act==="pick-player"){
      const pl=players.find(p=>p.id===el.dataset.id);
      const inPos=(pickState.picks[pl.pos]||[]);
      if(inPos.includes(pl.id)){
        pickState.picks[pl.pos]=inPos.filter(id=>id!==pl.id);
        if(pickState.kapten===pl.id)pickState.kapten=null;
        pickErr=""; render(); return;
      }
      if(inPos.length>=POS_COUNT[pl.pos]){pickErr=`Du har redan valt ${POS_COUNT[pl.pos]} ${POS_LABEL[pl.pos].toLowerCase()}(e).`;render();setTimeout(()=>{pickErr="";render();},2200);return;}
      const used=usedTeamIds(null);
      if(used.includes(pl.teamId)){pickErr="Du har redan en spelare från det laget i ditt lag.";render();setTimeout(()=>{pickErr="";render();},2200);return;}
      pickState.picks[pl.pos]=[...inPos,pl.id];
      pickErr=""; render();
    }
    else if(act==="toggle-cap"){
      const id=el.dataset.id;
      pickState.kapten = pickState.kapten===id ? null : id;
      pickErr=""; render();
    }
    else if(act==="save-team"){
      const allFilled=POSITIONS.every(pos=>(pickState.picks[pos]||[]).length===POS_COUNT[pos]);
      if(!allFilled){pickErr="Fyll alla positioner enligt 4-3-3 innan du sparar.";render();return;}
      if(!pickState.kapten){pickErr="Sätt en kapten innan du sparar.";render();return;}
      await updateUserPicks(currentUser.id,pickState.picks,pickState.kapten);
      users=users.map(u=>u.id===currentUser.id?{...u,picks:pickState.picks,kapten:pickState.kapten}:u);
      currentUser={...currentUser,picks:pickState.picks,kapten:pickState.kapten};
      pickErr=""; screen="main"; mainTab="hem"; render();
    }
    else if(act==="edit-team"){
      pickState={picks: currentUser.picks ? {GK:[...(currentUser.picks.GK||[])],DEF:[...(currentUser.picks.DEF||[])],MID:[...(currentUser.picks.MID||[])],FW:[...(currentUser.picks.FW||[])]} : {GK:[],DEF:[],MID:[],FW:[]}, kapten:currentUser.kapten||null};
      pickPos="GK"; pickErr=""; screen="pick"; render();
    }
    else if(act==="logout"){currentUser=null;appMode=null;screen="home";homeMode="start";render();}
    else if(act==="main-tab"){
      const tab=el.dataset.tab;
      if(tab==="regler"){ rulesFrom="main"; screen="rules"; render(); return; }
      mainTab=tab;errMsg="";
      if(tab==="tipp"){ tipDraft={}; }
      if(mainTab==="adm" && adminOk && adminSection==="round"){ bulkRows=defaultBulkRows(String(cfg.omg)); }
      render();
    }
    else if(act==="user-pick-tipp-round"){
      userSelectedRound=Number(el.dataset.r); render();
    }
    else if(act==="user-jump-round"){
      const r=Number(el.dataset.r);
      cfg={...cfg,omg:r};
      userSelectedRound=r;
      openRounds=new Set([r]);
      if(appMode==="streak"){ rounds=await fetchRounds(); }
      render();
    }
    else if(act==="toggle-round"){const r=Number(el.dataset.r);if(openRounds.has(r))openRounds.delete(r);else openRounds.add(r);render();}
    else if(act==="admin-login"){
      // Denna väg används inte i UI:t (inloggningsknappen anropar window._doAdminLogin()),
      // men vi låter den peka på samma säkra flöde ifall något annat triggar den.
      await window._doAdminLogin();
    }
    else if(act==="admin-section"){
      adminSection=el.dataset.sec;errMsg="";confirmRemoveId=null;confirmDeleteRound=false;
      if(adminSection==="round"){ bulkRows=defaultBulkRows(String(cfg.omg)); }
      if(adminSection==="quiz"){ try{quizQuestions=await fetchAllQuizAdmin();}catch(e){quizQuestions=[];} }
      if(adminSection==="season"){ window._allLeaguesCache=null; }
      if(adminSection==="statistik"){
        statsRound = statsRound || cfg.omg;
        try{
          [snabbastAllTips,måljaktenAllTips,window._statsQuizAnswers,streakAllTips,allLeagueTips] = await Promise.all([
            fetchAllSnabbastTips(statsRound),
            fetchAllMåljaktenTips(statsRound),
            fetchAllQuizAnswers(statsRound),
            fetchAllStreakTips(),
            fetchAllLigatips()
          ]);
        }catch(e){console.error(e);}
      }
      render();
    }
    else if(act==="stat-round-nav"){
      const dir=Number(el.dataset.dir);
      const rnd=Math.max(1,(statsRound||cfg.omg)+dir);
      statsRound=rnd;
      try{
        [snabbastAllTips,måljaktenAllTips,window._statsQuizAnswers,streakAllTips] = await Promise.all([
          fetchAllSnabbastTips(rnd),
          fetchAllMåljaktenTips(rnd),
          fetchAllQuizAnswers(rnd),
          fetchAllStreakTips()
        ]);
      }catch(e){console.error(e);}
      render();
    }
    else if(act==="goals-search-update"){ render(); }
    else if(act==="admin-jump-round"){
      const n=Number(el.dataset.n);
      bulkRows=defaultBulkRows(String(n));
      cfg={...cfg,omg:n};
      confirmDeleteRound=false;
      render();
    }
    else if(act==="bulk-load"){
      const rnd=document.getElementById("bulk-rnd").value;
      bulkRows=defaultBulkRows(rnd);
      cfg={...cfg,omg:Number(rnd)};
      confirmDeleteRound=false;
      render();
    }
    else if(act==="bulk-addrow"){
      bulkRows=[...bulkRows,{hId:TEAMS[0].id,aId:TEAMS[1].id,hMål:0,aMål:0}];
      render();
    }
    else if(act==="bulk-remove"){
      const idx=Number(el.dataset.idx);
      bulkRows=bulkRows.filter((_,i)=>i!==idx);
      render();
    }
    else if(act==="import-preview"){
      const text=document.getElementById("import-text").value;
      const parsed=parseScheduleText(text);
      const previewArea=document.getElementById("import-preview-area");
      if(!parsed.length){
        previewArea.innerHTML=`<div class="fg-card" style="color:#c1272d;font-size:13px">Inga omgångar hittades. Kontrollera att texten innehåller "Omgång X" och lagnamn.</div>`;
        return;
      }
      let html=`<div class="fg-card"><div style="font-weight:500;margin-bottom:8px">Förhandsvisning – ${parsed.length} omgångar hittade</div>`;
      parsed.forEach(({roundNum,matches,errors})=>{
        html+=`<div style="margin-bottom:14px"><div style="font-weight:500;font-size:13px;color:${G_GREEN};margin-bottom:6px">Omgång ${roundNum} (${matches.length} matcher)</div>`;
        matches.forEach(m=>{
          const h=TEAMS.find(t=>t.id===m.hId),a=TEAMS.find(t=>t.id===m.aId);
          html+=`<div style="display:flex;gap:6px;font-size:12px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
            <span style="flex:1;text-align:right">${esc(h?h.name:m.hRaw)}</span>
            <span style="color:var(--color-text-secondary)">vs</span>
            <span style="flex:1">${esc(a?a.name:m.aRaw)}</span>
          </div>`;
        });
        if(errors.length) html+=`<div style="font-size:11px;color:#c1272d;margin-top:4px">⚠ Kunde inte matcha: ${errors.join(", ")}</div>`;
        html+=`</div>`;
      });
      html+=`<button class="fg-btn" data-act="import-save" style="margin-top:4px">Spara alla omgångar</button></div>`;
      previewArea.innerHTML=html;
      previewArea._parsed=parsed;
    }
    else if(act==="import-save"){
      const previewArea=document.getElementById("import-preview-area");
      const parsed=previewArea._parsed;
      if(!parsed||!parsed.length){flash("Kör förhandsgranskning först.");return;}
      el.textContent="Sparar…"; el.disabled=true;
      let saved=0;
      for(const {roundNum,matches} of parsed){
        const matchData=matches.filter(m=>m.hId&&m.aId).map(m=>({hId:m.hId,aId:m.aId,hMål:0,aMål:0}));
        if(!matchData.length)continue;
        const cur=rounds[String(roundNum)]||{matches:[],goals:{},locked:false,picks_snapshot:{},results_published:false};
        const {error}=await sb.from("rounds").upsert({round_num:Number(roundNum),matches:matchData,goals:cur.goals||{},locked:cur.locked||false,locked_at:cur.locked_at||null,snabbast_result:cur.snabbast_result||[],picks_snapshot:cur.picks_snapshot||{},results_published:cur.results_published||false,league_id:currentLeague.id});
        if(!error){
          rounds={...rounds,[String(roundNum)]:{...cur,matches:matchData}};
          saved++;
        }
      }
      flash(`✓ ${saved} omgångar sparade!`);
    }
    else if(act==="save-passwords"){
      const newPwd=document.getElementById("new-own-pwd").value.trim();
      if(!newPwd||newPwd.length<6){flash("Lösenordet måste vara minst 6 tecken.");return;}
      const {error}=await sb.auth.updateUser({password:newPwd});
      if(error){flash("Fel: "+error.message);return;}
      document.getElementById("new-own-pwd").value="";
      flash("✓ Lösenord uppdaterat!");
    }
    else if(act==="toggle-ligatipp-lock"){
      await toggleLigatippLock(newLocked);
      cfg={...cfg,ligatippLocked:newLocked};
      flash(newLocked?"✓ Tippa serienning stängd!":"✓ Tippa serienning öppnad!");
    }
    else if(act==="save-standings"){
      const cp=Number(el.dataset.cp);
      const selects=document.querySelectorAll(`[data-act="standings-pick"][data-cp="${cp}"]`);
      const arr=[];
      let ok=true;
      selects.forEach(s=>{ const v=Number(s.value); if(!v){ok=false;} arr.push(v); });
      if(!ok){flash("Fyll i alla 14 placeringar.");return;}
      const uniqueIds=new Set(arr);
      if(uniqueIds.size!==14){flash("Varje lag får bara förekomma en gång.");return;}
      const error=await saveLigatippStandings(cp,arr);
      if(error){flash("Fel: "+error.message);return;}
      ligatippStandings={...ligatippStandings,[cp]:{standings:arr,locked:true}};
      flash("✓ Verklig tabell sparad för checkpoint "+cp+"!");
    }
    else if(act==="toggle-registration"){
      await toggleRegistration(open);
      cfg={...cfg,registrationOpen:open};
      flash(open?"✓ Registrering är nu öppen.":"✓ Registrering är nu stängd.");
    }
    else if(act==="publish-results"){
      const rnd=String(cfg.omg);
      const cur=rounds[rnd]||{};
      const nowPublished=!cur.results_published;
      if(nowPublished&&allPrivateLeagues.length) await updatePrivateLeagueSnapshots();
      const result=await publishRoundResults(rnd,nowPublished);
      if(result.error){flash("Fel: "+result.error.message);return;}
      rounds={...rounds,[rnd]:{...cur,results_published:nowPublished,picks_snapshot:nowPublished?result.picks_snapshot:cur.picks_snapshot}};
      try{allPrivateLeagues=await fetchPrivateLeagues();}catch(e){}

      // ── Beräkna streak-resultat ───────────────────────────────────────────
      if(nowPublished){
        const rd=rounds[rnd];
        const matches=rd.matches||[];
        const goals=rd.goals||{};
        // Hämta alla streak-tips för denna omgång
        const {data:roundStreakTips}=await sb.from("streak_tips")
          .select("*").eq("league_id",currentLeague.id).eq("round_num",Number(rnd));
        if(roundStreakTips?.length){
          for(const tip of roundStreakTips){
            const picks=tip.picks||{};
            let allCorrect=true;
            let pickCount=0;
            for(const [mIdx,sign] of Object.entries(picks)){
              const m=matches[Number(mIdx)];
              if(!m){allCorrect=false;break;}
              const hg=goals[m.id]?.h??m.hMål??0;
              const ag=goals[m.id]?.a??m.aMål??0;
              const actual=hg>ag?"1":hg<ag?"2":"X";
              if(sign!==actual) allCorrect=false;
              pickCount++;
            }
            if(pickCount<3) allCorrect=false;
            await sb.from("streak_tips").update({correct:allCorrect})
              .eq("id",tip.id);
          }
          flash(`✅ Resultat publicerade – ${roundStreakTips.length} streak-tips räknade!`);
        } else {
          flash("✅ Resultat publicerade – poäng räknas nu!");
        }
      } else {
        // Återkalla – nollställ correct för denna omgång
        await sb.from("streak_tips").update({correct:null})
          .eq("league_id",currentLeague.id).eq("round_num",Number(rnd));
        flash("⏳ Resultat återkallades.");
      }
    }
    else if(act==="save-lock-deadline"){
      const val=document.getElementById("lock-deadline-input").value;
      if(!val){alert("Välj ett datum och tid först.");return;}
      const rnd=String(cfg.omg);
      const iso=new Date(val).toISOString();
      await saveRoundDeadline(rnd,iso);
      rounds={...rounds,[rnd]:{...(rounds[rnd]||{matches:[],goals:{},locked:false,picks_snapshot:{},results_published:false}),lock_deadline:iso}};
      render();
    }
    else if(act==="toggle-lock"){
      const rnd=String(cfg.omg);
      const nowLocked=el.dataset.locked==="1"?false:true;
      const result=await toggleRoundLock(rnd,nowLocked);
      const cur=rounds[rnd]||{matches:[],goals:{},locked:false,picks_snapshot:{}};
      rounds={...rounds,[rnd]:{...cur,locked:nowLocked,locked_at:nowLocked?result.locked_at:null,picks_snapshot:result.picks_snapshot}};
      flash(nowLocked?"✓ Omgången är nu låst – poäng räknas!":"✓ Omgången är upplåst igen.");
    }
    else if(act==="ask-delete-round"){ confirmDeleteRound=true; render(); }
    else if(act==="cancel-delete-round"){ confirmDeleteRound=false; render(); }
    else if(act==="save-tips"){
      const rd=rounds[String(cfg.omg)];
      if(!rd||!rd.matches.length){flash("Inga matcher att tippa på.");return;}
      el.textContent="Sparar…";
      el.disabled=true;
      const tipsArr=rd.matches.map(m=>{
        const hInput=document.querySelector(`[data-act="tip-input"][data-side="h"][data-hid="${m.hId}"][data-aid="${m.aId}"]`);
        const aInput=document.querySelector(`[data-act="tip-input"][data-side="a"][data-hid="${m.hId}"][data-aid="${m.aId}"]`);
        const predH=hInput?Number(hInput.value)||0:0;
        const predA=aInput?Number(aInput.value)||0:0;
        return {hId:m.hId,aId:m.aId,predH,predA};
      });
      const allTips={...(currentUser.tips||{}),[String(cfg.omg)]:tipsArr};
      const {error}=await sb.from("fantasy_users").update({tips:allTips}).eq("id",currentUser.id);
      if(error){
        console.error("Tips-fel:",error);
        flash("❌ Kunde inte spara: "+error.message);
        return;
      }
      currentUser={...currentUser,tips:allTips};
      users=users.map(u=>u.id===currentUser.id?{...u,tips:allTips}:u);
      tipDraft={};
      flash("✓ Dina tips är sparade!");
    }
    else if(act==="confirm-delete-round"){
      const rnd=String(cfg.omg);
      await deleteRound(rnd);
      const newRounds={...rounds}; delete newRounds[rnd]; rounds=newRounds;
      confirmDeleteRound=false;
      bulkRows=defaultBulkRows(rnd);
      flash("✓ Omgång "+rnd+" raderad.");
    }
    else if(act==="fetch-scores"){
      const raw=document.getElementById("fk-text")?.value?.trim();
      if(!raw){flash("Klistra in text från Fotbollskollen.");return;}

      // Parsa samma format som importverktyget
      const cleaned=raw.replace(/ emblem/g,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
      const normalizeStr=s=>s.toLowerCase().replace(/\s+/g," ").trim();

      const lines=cleaned.split("\n").map(l=>l.trim()).filter(l=>l.length>0);
      const entries=[]; // {team, goals}
      let i=0;
      while(i<lines.length){
        const line=lines[i];
        // Hoppa över metadata
        if(/^\d{1,2}:\d{2}/.test(line)||/^Publik:/i.test(line)||/^Omgång/i.test(line)||/^\d+,/.test(line)||/^\d+ \w+ \d{4}/.test(line)){
          i++; continue;
        }
        // Lagnamn följt av ensam siffra på nästa rad
        const nextLine=lines[i+1];
        if(nextLine&&/^\d+$/.test(nextLine)){
          // Kontrollera om raden är ett lagnamn (matcha mot TEAMS)
          const lower=normalizeStr(line);
          let foundTeam=TEAMS.find(t=>normalizeStr(t.name)===lower||lower.startsWith(normalizeStr(t.name)));
          if(!foundTeam){
            // Försök med första 2 ord
            const lineWords=lower.split(" ").slice(0,2).join(" ");
            foundTeam=TEAMS.find(t=>{
              const tnWords=normalizeStr(t.name).split(" ").slice(0,2).join(" ");
              return tnWords===lineWords;
            });
          }
          if(foundTeam){
            entries.push({team:foundTeam.name,goals:Number(nextLine)});
            i+=2; continue;
          }
        }
        i++;
      }

      console.log("Resultat-entries:",entries);
      if(entries.length<2){flash(`Hittade ${entries.length} poster – kontrollera texten.`);return;}

      const parsedMatches=[];
      for(let j=0;j<entries.length-1;j+=2){
        parsedMatches.push({homeTeam:entries[j].team,homeScore:entries[j].goals,awayTeam:entries[j+1].team,awayScore:entries[j+1].goals});
      }

      if(bulkRows.length>0){
        bulkRows=bulkRows.map((r,idx)=>{
          const pm=parsedMatches[idx];
          if(!pm)return r;
          return {...r,hMål:pm.homeScore,aMål:pm.awayScore};
        });
      } else {
        const rd=rounds[String(cfg.omg)];
        const existingMatches=rd?.matches||[];
        bulkRows=parsedMatches.map((pm,idx)=>{
          const ex=existingMatches[idx];
          return {hId:ex?.hId||"",aId:ex?.aId||"",hMål:pm.homeScore,aMål:pm.awayScore,id:ex?.id||`m${idx}`};
        });
      }
      render();
      flash(`✓ ${parsedMatches.length} resultat inlästa! Kontrollera och klicka "Spara resultat".`);
    }
    else if(act==="bulk-save"){
      const rnd=document.getElementById("bulk-rnd").value;
      const teamCount={};
      let dup=false;
      bulkRows.forEach(r=>{
        teamCount[r.hId]=(teamCount[r.hId]||0)+1;
        teamCount[r.aId]=(teamCount[r.aId]||0)+1;
        if(r.hId===r.aId)dup=true;
      });
      if(dup){flash("Ett lag kan inte möta sig själv.");return;}
      const matches=bulkRows.map(r=>({hId:r.hId,aId:r.aId,hMål:r.hMål,aMål:r.aMål}));
      await saveRoundMatches(rnd,matches);
      const cur=rounds[rnd]||{matches:[],goals:{}};
      rounds={...rounds,[rnd]:{...cur,matches}};
      await setConfig(Number(rnd));
      cfg={...cfg,omg:Number(rnd)};
      flash("✓ Omgång "+rnd+" sparad och satt som aktiv!");
    }
    else if(act==="add-player"){
      const namn=document.getElementById("np-namn").value.trim();
      const pos=document.getElementById("np-pos").value;
      const team=Number(document.getElementById("np-team").value);
      if(!namn){flash("Ange spelarnamn.");return;}
      const np={id:"p"+Math.random().toString(36).slice(2,10),namn:namn,pos:pos,teamId:team};
      await insertPlayer(np);
      players=[...players,np];
      flash("✓ Spelare tillagd!");
    }
    else if(act==="remove-player"){
      const id=el.dataset.id;
      await deletePlayer(id);
      players=players.filter(p=>p.id!==id); render();
    }
    else if(act==="ask-remove-user"){ confirmRemoveId=el.dataset.id; render(); }
    else if(act==="cancel-remove"){ confirmRemoveId=null; render(); }
    else if(act==="save-team-name"){
      const id=Number(el.dataset.id);
      const input=document.querySelector('[data-act="team-name-input"][data-id="'+id+'"]');
      const newName=input.value.trim();
      if(!newName){flash("Lagnamn kan inte vara tomt.");return;}
      await updateTeamName(id,newName);
      TEAMS=TEAMS.map(t=>t.id===id?{...t,name:newName}:t);
      flash("✓ Lagnamn uppdaterat!");
    }
    else if(act==="confirm-remove-user"){
      const id=el.dataset.id;
      const removed=users.find(u=>u.id===id);
      await deleteUser(id);
      users=users.filter(u=>u.id!==id);
      if(currentUser && currentUser.id===id){ currentUser=null; screen="home"; homeMode="start"; }
      confirmRemoveId=null;
      flash("✓ "+(removed?removed.namn:"Användaren")+" har uteslutits.");
    }
  };

  root.onchange=async function(e){
    const el=e.target;
    if(!el.dataset||!el.dataset.act)return;
    const act=el.dataset.act;
    if(act==="set-goals"){
      const rnd=document.getElementById("goals-rnd-input").value;
      const pid=el.dataset.id;
      const val=Number(el.value);
      const cur=rounds[rnd]||{matches:[],goals:{}};
      const goals={...cur.goals,[pid]:val};
      await saveRoundGoals(rnd,goals);
      rounds={...rounds,[rnd]:{...cur,goals}};
    }
    else if(act==="bulk-hid"){ bulkRows[Number(el.dataset.idx)].hId=Number(el.value); }
    else if(act==="bulk-aid"){ bulkRows[Number(el.dataset.idx)].aId=Number(el.value); }
    else if(act==="bulk-hm"){ bulkRows[Number(el.dataset.idx)].hMål=Number(el.value); }
    else if(act==="bulk-am"){ bulkRows[Number(el.dataset.idx)].aMål=Number(el.value); }
    else if(act==="tip-input"){
      const key=el.dataset.hid+"-"+el.dataset.aid;
      const cur=tipDraft[key]||{predH:"",predA:""};
      if(el.dataset.side==="h") cur.predH=el.value; else cur.predA=el.value;
      tipDraft[key]=cur;
    }
  };
}

// ── Init ──────────────────────────────────────────────────────────────────
(async function init(){
  leagues=await fetchLeagues();
  // Om inga aktiva ligor, hämta alla och ta den senaste
  if(!leagues.length){
    const {data}=await sb.from("leagues").select("*").order("id",{ascending:false}).limit(1);
    if(data?.length) leagues=data;
  }
  if(leagues.length>=1){
    currentLeague=leagues[0];
    TEAMS=await fetchTeams();
    players=await fetchPlayers();
    users=await fetchUsers();
    rounds=await fetchRounds();
    cfg=await fetchConfig();
    screen="home";
  } else {
    screen="leagues";
  }
  render();
  updateCountdownEls();
  setInterval(updateCountdownEls,30000);
})();
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW error:',e));
  });
}
</script>
</body>
</html>
